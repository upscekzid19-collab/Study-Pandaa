<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b1326;
            font-family: 'Public Sans', sans-serif;
            overflow-x: hidden;
        }
        .login-card {
            background-color: #1e293b; /* Level 1 Surface */
            border: 1px solid #334155;
        }
        .input-field {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .amber-button {
            background-color: #ee9800; /* Amber/Gold Accent from Secondary Container */
            color: #0b1326;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .amber-button:hover {
            background-color: #ffb95f;
            transform: translateY(-1px);
        }
        .amber-button:active {
            transform: translateY(0px);
        }
        .subtle-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(51, 65, 85, 0.3) 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex flex-col items-center justify-center p-6 subtle-grid">
<!-- Top Branding / Visual Anchor -->
<div class="mb-12 flex flex-col items-center">
<div class="relative w-24 h-24 mb-6 rounded-full overflow-hidden border-2 border-outline-variant p-1 bg-surface-container">
<img alt="Study Panda Logo" class="w-full h-full object-cover rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBK-hyLPG5dkdjb0RAu6glbA0_Qa3pFl3yGvZTqEbW-CWXHSMkOwumkSARzjOPH08wcDHWKqB97AB2LSJjb51RurtkshctQNo2xYzAmjSWTcPSpi59KIisqNfzYg_HKebYVb5B473sdnXbEsFM8fK1frXmuej672JlXL1Qxct3zBg3hn3CbodkO-aLRf-965UmsxVxE4qwwtP9UEExpnXGmVsNWe2Q3_qXExFGmVW0YFdaisfbTLGEM_eLFwp2_bRVldm-Op7AcoH-"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight text-center">
            Study Panda
        </h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase mt-1">Dream Big, Study Hard, Succeed Always</p>
</div>
<!-- Central Auth Container -->
<div class="w-full max-w-md">
<main class="login-card p-8 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Decorative Accents -->
<div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>
<header class="mb-8">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Admin Access</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please authenticate with your institutional credentials to enter the administration dashboard.</p>
</header>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="admin-email">Admin Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-body-md">mail</span>
<input class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-on-surface font-body-md" id="admin-email" placeholder="e.g. administrator@studypanda.edu" type="email"/>
</div>
</div>
<!-- Security Key Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant" for="security-key">Security Key/Password</label>
<a class="font-caption text-caption text-primary hover:underline" href="#">Forgot Security Key?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-body-md">lock</span>
<input class="input-field w-full pl-10 pr-12 py-3 rounded-lg text-on-surface font-body-md" id="security-key" placeholder="••••••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="amber-button w-full py-4 rounded-lg font-label-md text-label-md uppercase tracking-wider font-bold shadow-lg flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
                    Login as Admin
                </button>
</form>
<!-- Footer Actions -->
<footer class="mt-8 pt-6 border-t border-outline-variant flex flex-col items-center gap-4">
<a class="group flex items-center gap-2 font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-body-md transition-transform group-hover:-translate-x-1">arrow_back</span>
                    Return to Student Login
                </a>
</footer>
</main>
<!-- Trust Markers -->
<div class="mt-10 flex justify-center items-center gap-6 opacity-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="font-caption text-caption">End-to-End Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">shield</span>
<span class="font-caption text-caption">Sovereign Cloud Secured</span>
</div>
</div>
</div>
<!-- Bottom Navigation Omitted as per Requirements -->
<script>
        // Micro-interaction for the "Visibility" toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('security-key');
        
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }

        // Form submission ripple/feedback effect simulation
        const loginForm = document.querySelector('form');
        loginForm.addEventListener('submit', () => {
            const btn = loginForm.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Validating...`;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1500);
        });
    </script>
</body></html>
