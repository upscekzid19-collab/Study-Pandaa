<body class="font-body-md custom-scrollbar">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-background dark:bg-background flex justify-between items-center px-margin-mobile md:px-xl py-sm">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95" title="Go back">arrow_back</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Quiz Architect</h1>
</div>
<div class="hidden md:flex items-center gap-lg">
<span class="text-on-surface-variant font-label-md text-label-md">Admin Portal</span>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-xs">AD</div>
</div>
</header>
<main class="max-w-container-max mx-auto px-margin-mobile md:px-xl py-lg pb-32">
<!-- Tab Switcher -->
<div class="flex flex-col md:flex-row gap-gutter mb-lg border-b border-outline-variant">
<button class="pb-base px-sm border-b-2 border-primary text-primary font-label-md text-label-md flex items-center gap-xs transition-all" id="tab-daily" onclick="switchTab('daily')">
<span class="material-symbols-outlined text-[20px]">calendar_today</span>
                Daily Quiz (5 MCQs)
            </button>
<button class="pb-base px-sm border-b-2 border-transparent text-on-surface-variant hover:text-on-surface font-label-md text-label-md flex items-center gap-xs transition-all" id="tab-subject" onclick="switchTab('subject')">
<span class="material-symbols-outlined text-[20px]">menu_book</span>
                Subject Test
            </button>
</div>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-lg">
<!-- Left Column: Settings -->
<div class="lg:col-span-4 space-y-lg">
<div class="tonal-layer-1 p-lg rounded-xl">
<h2 class="font-headline-md text-headline-md text-primary mb-md">Quiz Identity</h2>
<div class="space-y-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Quiz Title</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm text-on-surface placeholder:text-outline" placeholder="e.g., Indian Polity - Fundamental Rights" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Category</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm text-on-surface appearance-none">
<option value="upsc">UPSC Civil Services</option>
<option value="jkpsc">JKPSC KAS</option>
<option value="jkp">JKP Constable</option>
<option value="ssc">SSC CGL</option>
</select>
</div>
<div class="pt-md">
<div class="flex items-center justify-between p-sm tonal-layer-2 rounded-lg">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary">verified</span>
<span class="text-caption font-label-md">Status: Draft</span>
</div>
<span class="text-caption text-outline">Last saved 2m ago</span>
</div>
</div>
</div>
</div>
<!-- Visual Asset / Placeholder -->
<div class="hidden lg:block relative h-64 rounded-xl overflow-hidden tonal-layer-1">
<div class="absolute inset-0 bg-cover bg-center opacity-40 grayscale group-hover:grayscale-0 transition-all duration-700" data-alt="A sophisticated, high-end digital illustration of a government building silhouette integrated into a complex circuit board pattern. The color palette consists of deep midnight blue, slate greys, and glowing amber accents. The style is professional, institutional, and modern, conveying authority and technical precision." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDJ4dh2oyabPGnHRHWBv1oPKSkuCQ3EjbICvLtLP57b2hA6LxxwWSRSo2QZqqgePgNIROchiGtdBM6owNFjfGIw28aSRtUN2Of3NLFflkwrslESltRODgMllg88C-XTfp0NOqzYle6ShomzltbznJHMYYzW0Cy7_YNDD3lCOo1PR0MYIuGy_guG8qHFG1pHU3Z0tIYgabzoT93BBfivpw8dneIvLPqmtaZOPF_Rg-aQ-q6Aii93RaqsdxrzxqP-CpfIKjPQDQnDkV2M')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
<div class="absolute bottom-md left-md">
<p class="font-label-md text-label-md text-primary">Sovereign Standard</p>
<p class="text-caption text-on-surface-variant">Administered by Study Panda</p>
</div>
</div>
</div>
<!-- Right Column: Question Builder -->
<div class="lg:col-span-8">
<div class="tonal-layer-1 rounded-xl overflow-hidden shadow-2xl">
<!-- Builder Header -->
<div class="bg-surface-container-high px-lg py-md flex justify-between items-center border-b border-outline-variant">
<div class="flex items-center gap-sm">
<span class="w-8 h-8 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-bold">1</span>
<h3 class="font-headline-md text-headline-md">Question Editor</h3>
</div>
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-outline-variant hover:text-error transition-colors" title="Delete Question">delete</button>
<button class="material-symbols-outlined text-outline-variant hover:text-primary transition-colors" title="Duplicate">content_copy</button>
</div>
</div>
<!-- Builder Body -->
<div class="p-lg space-y-lg">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Question Text</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface placeholder:text-outline resize-none" placeholder="Enter the question prompt here..." rows="3"></textarea>
</div>
<!-- MCQ Options -->
<div class="grid grid-cols-1 gap-md">
<label class="block font-label-md text-label-md text-on-surface-variant">Options (Mark correct answer)</label>
<div class="flex items-center gap-md group">
<label class="relative flex items-center cursor-pointer">

<div class="w-6 h-6 border-2 border-outline rounded-full peer-checked:border-secondary peer-checked:bg-secondary flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 bg-on-secondary-container rounded-full opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<div class="flex-1 flex items-center bg-surface-container-low border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary transition-colors">
<span class="px-md font-bold text-on-surface-variant border-r border-outline-variant">A</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-md py-sm text-on-surface" placeholder="Option A content" type="text"/>
</div>
</div>
<div class="flex items-center gap-md group">
<label class="relative flex items-center cursor-pointer">
<input class="hidden peer" name="correct-ans" type="radio"/>

</div>
</label>
<div class="flex-1 flex items-center bg-surface-container-low border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary transition-colors">
<span class="px-md font-bold text-on-surface-variant border-r border-outline-variant">B</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-md py-sm text-on-surface" placeholder="Option B content" type="text"/>
</div>
</div>
<div class="flex items-center gap-md group">
<label class="relative flex items-center cursor-pointer">
<input class="hidden peer" name="correct-ans" type="radio"/>
<div class="w-6 h-6 border-2 border-outline rounded-full peer-checked:border-secondary peer-checked:bg-secondary flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 bg-on-secondary-container rounded-full opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<div class="flex-1 flex items-center bg-surface-container-low border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary transition-colors">
<span class="px-md font-bold text-on-surface-variant border-r border-outline-variant">C</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-md py-sm text-on-surface" placeholder="Option C content" type="text"/>
</div>
</div>

<label class="relative flex items-center cursor-pointer">

<div class="w-6 h-6 border-2 border-outline rounded-full peer-checked:border-secondary peer-checked:bg-secondary flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 bg-on-secondary-container rounded-full opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<div class="flex-1 flex items-center bg-surface-container-low border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary transition-colors">
<span class="px-md font-bold text-on-surface-variant border-r border-outline-variant">D</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-md py-sm text-on-surface" placeholder="Option D content" type="text"/>
</div>
</div>
</div>
<!-- Explanation -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Add Explanation (Solution)</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface placeholder:text-outline resize-none" placeholder="Provide a detailed rationale for the correct answer..." rows="4"></textarea>
</div>
</div>
<!-- Builder Footer -->
<div class="px-lg py-md bg-surface-container-low flex justify-between border-t border-outline-variant">
<button class="flex items-center gap-xs font-label-md text-label-md text-secondary border border-secondary px-lg py-sm rounded-lg hover:bg-secondary/10 transition-colors active:scale-95">
<span class="material-symbols-outlined text-[20px]">add</span>
                            Add Question
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-surface-container h-24 flex items-center px-margin-mobile md:px-xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<div class="max-w-container-max mx-auto w-full flex items-center justify-between">
<div class="hidden md:flex flex-col">
<span class="text-caption text-on-surface-variant uppercase tracking-widest font-bold">Progress</span>
<div class="flex items-center gap-sm">

<div class="bg-primary w-1/5 h-full"></div>
</div>
<span class="font-label-md text-label-md text-primary">1 / 5 Questions</span>
</div>
</div>
<div class="flex items-center gap-lg w-full md:w-auto">
<button class="flex-1 md:flex-none px-xl py-md font-label-md text-label-md border border-outline text-on-surface-variant hover:bg-surface-variant rounded-lg transition-colors">
                    Save Draft
                </button>
<button class="flex-1 md:flex-none px-xl py-md font-label-md text-label-md bg-primary text-on-primary rounded-lg shadow-lg hover:opacity-90 transition-opacity active:scale-95 flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[20px]">publish</span>
                    Publish Quiz
                </button>
</div>
</div>
</div>
<!-- Admin Bottom Nav (Shared Component Ref) -->
<nav class="hidden fixed bottom-0 w-full z-50 md:flex justify-around items-center h-16 px-4 bg-surface-container border-t border-outline-variant/30 opacity-0 pointer-events-none">
<!-- Kept here for logic/consistency mapping but suppressed as per context rules for transactional/task screens -->
</nav>
<!-- Mobile Bottom Nav -->
<div class="md:hidden fixed bottom-24 w-full px-margin-mobile flex justify-center pointer-events-none">
<div class="bg-surface-container-high rounded-full px-lg py-sm shadow-xl flex items-center gap-xl pointer-events-auto border border-outline-variant">
<button class="flex flex-col items-center text-on-surface-variant" title="Admin">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</button>
<button class="flex flex-col items-center text-primary" title="Edit">
<span class="material-symbols-outlined">edit_note</span>
</button>
<button class="flex flex-col items-center text-on-surface-variant" title="Help">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
<script>
        function switchTab(type) {
            const daily = document.getElementById('tab-daily');
            const subject = document.getElementById('tab-subject');
            
            if (type === 'daily') {
                daily.classList.add('border-primary', 'text-primary');
                daily.classList.remove('border-transparent', 'text-on-surface-variant');
                subject.classList.add('border-transparent', 'text-on-surface-variant');
                subject.classList.remove('border-primary', 'text-primary');
            } else {
                subject.classList.add('border-primary', 'text-primary');
                subject.classList.remove('border-transparent', 'text-on-surface-variant');
                daily.classList.add('border-transparent', 'text-on-surface-variant');
                daily.classList.remove('border-primary', 'text-primary');
            }
        }
    </script>
