<style>
        body {
            background-color: #0b1326;
            color: #dae2fd;

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {

<body class="flex flex-col min-h-screen">
<!-- Top Navigation Anchor -->
<header class="w-full top-0 flex justify-between items-center px-margin-mobile py-sm w-full bg-background dark:bg-background">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary">menu_book</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">Study Panda</span>
</div>
<div class="hidden md:flex gap-md">
<a class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity" href="#">Login</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:opacity-80 transition-opacity" href="#">Admin</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:opacity-80 transition-opacity" href="#">Help</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-md md:p-xl">
<div class="w-full max-w-[440px]">
<!-- Hero / Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="relative w-48 h-48 md:w-56 md:h-56 mb-md animate-fade-in overflow-hidden rounded-full border-2 border-secondary-container">
<img alt="Study Panda Institutional Logo" class="w-full h-full object-cover aspect-square" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-87BkraOBfjyH8Ihk9GynGb39KZ4QLyEWfjDx6xe5D1oHMA7jc8Qyy8Y3FxNhUzYHHWU97zWmUvW5GlePoT47FVSwDH37UzMNTemTghsQYyqFuYDD4mfRzjATdXOQfAnsy17HmkNS5dWOdpXyfySls0Cprx8F-qa_sTb93lh83DucGebNIsfB4Pb8e1936qiO6-EET60g4RPn3J8LM337SjvTr-0j_EK8-oSDA7ysRNP2_23EUrhf8CR9x48aaQppgeVAlW8egAhS"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-center mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Dream Big, Study Hard, Succeed Always</p>
</div>
<!-- Login Card -->
<div class="login-card p-lg md:p-xl rounded-xl">
<form class="space-y-md" id="login-form">
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<input class="bg-surface-container-high border-outline-variant text-on-surface font-body-md text-body-md rounded-lg p-md focus:border-primary focus:ring-0 outline-none transition-all input-glow" id="email" placeholder="name@institution.edu" required="" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-high border-outline-variant text-on-surface font-body-md text-body-md rounded-lg p-md pr-xl focus:border-primary focus:ring-0 outline-none transition-all input-glow" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full py-md bg-secondary-container text-on-secondary-container font-label-md text-label-md rounded-full font-bold hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-sm" type="submit">
                    Login
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="font-caption text-caption text-on-surface-variant">Or</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-md border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-container-high transition-colors active:scale-95" type="button">
<img alt="Official Google color logo icon" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBI_MxFnw92aqueec-joKuuZ9qWkk35v6quqA-mrqrV94c10LzNHB7oUVVJ7dH18VOlBcBDd58U97Q0ILuKrmyonT1yIUSp4IFFux0fNOjJN-LeWckRVeZereJ8pmXZJxCtQWv3gOf_pjKwaDf0ZQ0Uxr3bWNGc0hP6oUr7j2nss7uCcd9W6gGNK5xk_XyXVkB2iRaeZtk9PVPRp9PRT0j6iPRDyETXgEF1A_BUgI53F3Ig1KcCC8X8trv7WwJiMUuY9aczfik_yOZ1"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-sm py-md border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-container-high transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apps</span>
                        Apple
                    </button>
</div>
</form>
<!-- Footer Context -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    New to Study Panda? 
                    <a class="text-primary font-semibold hover:underline" href="#">Create an Account</a>
</p>
</div>
<div class="mt-md pt-md border-t border-outline-variant/30 flex justify-center">
<a class="text-on-surface-variant/40 hover:text-primary transition-colors flex items-center gap-xs" href="#">
<span class="material-symbols-outlined text-[14px]">lock</span>
<span class="font-caption text-caption">Portal Access</span>
</a>
</div></div>
<!-- Admin Link Anchor -->
</div>
</main>
<!-- Bottom Navigation Shell (Mobile Only Filter) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center h-16 px-4 bg-surface-container dark:bg-surface-container">
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">login</span>
<span class="font-label-md text-label-md">Login</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">help_outline</span>
<span class="font-label-md text-label-md">Help</span>
</a>
</nav>
<script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.innerText = 'visibility_off';
        } else {
            pwd.type = 'password';
            icon.innerText = 'visibility';
        }
    }

    // Simple feedback for the form
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span> Authenticating...';
        btn.disabled = true;
        
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
            alert('In a live environment, this would process your credentials against our secure servers.');
        }, 1500);
    });
</script>
</body></html>
