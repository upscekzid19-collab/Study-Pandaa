<!-- Suppressed to prioritize the Canvas & Focus Journey -->
<script>
        let selectedGoal = null;

        function selectGoal(goal) {
            selectedGoal = goal;
            
            // UI Feedback for cards
            const upsc = document.getElementById('upsc-card');
            const jkpsc = document.getElementById('jkpsc-card');
            const btn = document.getElementById('continue-btn');

            if (goal === 'upsc') {
                upsc.classList.add('selected', 'border-primary', 'ring-2', 'ring-primary/20');
                jkpsc.classList.remove('selected', 'border-primary', 'ring-2', 'ring-primary/20');
            } else {
                jkpsc.classList.add('selected', 'border-secondary', 'ring-2', 'ring-secondary/20');
                upsc.classList.remove('selected', 'border-secondary', 'ring-2', 'ring-secondary/20');
            }

            // Enable button
            btn.disabled = false;
            btn.classList.remove('bg-outline-variant', 'text-on-surface-variant', 'cursor-not-allowed');
            btn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg', 'shadow-primary/20', 'hover:brightness-110', 'active:scale-95');
            
            // Micro-interaction: Playful bounce
            btn.classList.add('animate-bounce');
            setTimeout(() => btn.classList.remove('animate-bounce'), 500);
        }

        // Initialize micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', () => {
                    if (!card.classList.contains('selected')) {
                        card.style.transform = 'translateY(-2px)';
                    }
                });
                card.addEventListener('mouseleave', () => {
                    if (!card.classList.contains('selected')) {
                        card.style.transform = 'translateY(0)';
                    }
                });
            });
        });
    </script>
